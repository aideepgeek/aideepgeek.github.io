<!-- Search Modal -->
<div 
  x-show="searchOpen"
  x-transition:enter="transition ease-out duration-300"
  x-transition:enter-start="opacity-0"
  x-transition:enter-end="opacity-100"
  x-transition:leave="transition ease-in duration-200"
  x-transition:leave-start="opacity-100"
  x-transition:leave-end="opacity-0"
  class="fixed inset-0 z-50 overflow-y-auto"
  style="display: none;"
  aria-labelledby="modal-title"
  role="dialog"
  aria-modal="true"
>
  <!-- Background backdrop -->
  <div class="fixed inset-0 bg-secondary-900/75 backdrop-blur-sm transition-opacity" @click="searchOpen = false"></div>

  <div class="flex min-h-full items-center justify-center p-4 text-center sm:p-0">
    <div 
      x-show="searchOpen"
      x-transition:enter="transition ease-out duration-300"
      x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
      x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
      x-transition:leave="transition ease-in duration-200"
      x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
      x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
      class="relative transform overflow-hidden rounded-2xl bg-white dark:bg-secondary-900 text-left shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-2xl"
    >
      <!-- Search input -->
      <div class="p-6">
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <svg class="h-5 w-5 text-secondary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
          </div>
          <input 
            type="text" 
            x-ref="searchInput"
            x-data="{ query: '', results: [] }"
            x-model="query"
            @input="
              if (query.length > 2) {
                // Simple search implementation - can be enhanced with Lunr.js
                results = [
                  { title: 'Sample Post 1', url: '/blog/sample-post-1/', excerpt: 'This is a sample search result...' },
                  { title: 'Sample Post 2', url: '/blog/sample-post-2/', excerpt: 'Another sample search result...' },
                ].filter(item => item.title.toLowerCase().includes(query.toLowerCase()));
              } else {
                results = [];
              }
            "
            @keydown.escape="searchOpen = false"
            class="block w-full pl-12 pr-4 py-4 text-lg bg-secondary-50 dark:bg-secondary-800 border-0 rounded-xl text-secondary-900 dark:text-white placeholder-secondary-400 focus:ring-2 focus:ring-primary-500"
            placeholder="Search articles, projects, and more..."
            autocomplete="off"
          >
          <div class="absolute inset-y-0 right-0 pr-4 flex items-center">
            <kbd class="hidden sm:inline-block px-2 py-1 text-xs font-semibold text-secondary-500 bg-secondary-100 dark:bg-secondary-800 dark:text-secondary-400 rounded">ESC</kbd>
          </div>
        </div>
      </div>

      <!-- Search results -->
      <div 
        x-show="results.length > 0"
        class="border-t border-secondary-200 dark:border-secondary-800 max-h-96 overflow-y-auto"
      >
        <div class="p-4">
          <p class="text-xs font-semibold text-secondary-500 uppercase tracking-wider mb-3">Search Results</p>
          <ul class="space-y-2">
            <template x-for="result in results" :key="result.url">
              <li>
                <a 
                  :href="result.url"
                  class="block p-4 rounded-lg hover:bg-secondary-50 dark:hover:bg-secondary-800 transition-colors duration-200"
                  @click="searchOpen = false"
                >
                  <p class="text-sm font-medium text-secondary-900 dark:text-white" x-text="result.title"></p>
                  <p class="text-sm text-secondary-500 dark:text-secondary-400 mt-1" x-text="result.excerpt"></p>
                </a>
              </li>
            </template>
          </ul>
        </div>
      </div>

      <!-- Quick links -->
      <div x-show="results.length === 0" class="border-t border-secondary-200 dark:border-secondary-800">
        <div class="p-4">
          <p class="text-xs font-semibold text-secondary-500 uppercase tracking-wider mb-3">Quick Links</p>
          <div class="grid grid-cols-2 gap-2">
            <a href="{{ '/blog/' | relative_url }}" class="flex items-center p-3 rounded-lg hover:bg-secondary-50 dark:hover:bg-secondary-800 transition-colors duration-200">
              <svg class="w-5 h-5 text-primary-600 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"></path>
              </svg>
              <span class="text-sm text-secondary-700 dark:text-secondary-300">Blog</span>
            </a>
            <a href="{{ '/projects/' | relative_url }}" class="flex items-center p-3 rounded-lg hover:bg-secondary-50 dark:hover:bg-secondary-800 transition-colors duration-200">
              <svg class="w-5 h-5 text-primary-600 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path>
              </svg>
              <span class="text-sm text-secondary-700 dark:text-secondary-300">Projects</span>
            </a>
            <a href="{{ '/about/' | relative_url }}" class="flex items-center p-3 rounded-lg hover:bg-secondary-50 dark:hover:bg-secondary-800 transition-colors duration-200">
              <svg class="w-5 h-5 text-primary-600 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
              </svg>
              <span class="text-sm text-secondary-700 dark:text-secondary-300">About</span>
            </a>
            <a href="{{ '/contact/' | relative_url }}" class="flex items-center p-3 rounded-lg hover:bg-secondary-50 dark:hover:bg-secondary-800 transition-colors duration-200">
              <svg class="w-5 h-5 text-primary-600 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
              </svg>
              <span class="text-sm text-secondary-700 dark:text-secondary-300">Contact</span>
            </a>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="bg-secondary-50 dark:bg-secondary-800/50 px-6 py-3 flex justify-between items-center">
        <p class="text-xs text-secondary-500 dark:text-secondary-400">
          Press <kbd class="px-1.5 py-0.5 text-xs font-semibold bg-white dark:bg-secondary-700 rounded">ESC</kbd> to close
        </p>
        <p class="text-xs text-secondary-500 dark:text-secondary-400">
          Powered by Jekyll
        </p>
      </div>
    </div>
  </div>
</div>
