<header class="sticky top-0 z-40 glass border-b border-secondary-200 dark:border-secondary-800">
  <div class="container-custom">
    <div class="flex items-center justify-between h-16 lg:h-20">
      
      <!-- Logo -->
      <a href="{{ '/' | relative_url }}" class="flex items-center space-x-2 group">
        <div class="w-10 h-10 bg-gradient-to-br from-primary-600 to-accent-600 rounded-lg flex items-center justify-center transform group-hover:scale-105 transition-transform duration-200">
          <span class="text-white font-bold text-xl">M</span>
        </div>
        <span class="text-xl font-bold text-secondary-900 dark:text-white hidden sm:block">Modern</span>
      </a>
      
      <!-- Desktop Navigation -->
      <nav class="hidden lg:flex items-center space-x-8">
        <a href="{{ '/' | relative_url }}" class="nav-link {% if page.url == '/' %}nav-link-active{% endif %}">Home</a>
        <a href="{{ '/blog/' | relative_url }}" class="nav-link {% if page.url contains '/blog/' %}nav-link-active{% endif %}">Blog</a>
        <a href="{{ '/projects/' | relative_url }}" class="nav-link {% if page.url contains '/projects/' %}nav-link-active{% endif %}">Projects</a>
        <a href="{{ '/services/' | relative_url }}" class="nav-link {% if page.url contains '/services/' %}nav-link-active{% endif %}">Services</a>
        <a href="{{ '/contact/' | relative_url }}" class="nav-link {% if page.url contains '/contact/' %}nav-link-active{% endif %}">Contact</a>
        <a href="{{ '/about/' | relative_url }}" class="nav-link {% if page.url contains '/about/' %}nav-link-active{% endif %}">About</a>
      </nav>
      
      <!-- Right side actions -->
      <div class="flex items-center space-x-4">
        
        <!-- Search button -->
        <button 
          @click="searchOpen = true"
          class="p-2 text-secondary-500 hover:text-primary-600 dark:text-secondary-400 dark:hover:text-primary-400 transition-colors duration-200"
          aria-label="Search"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
        </button>
        
        <!-- Dark mode toggle -->
        <button 
          x-data="{ darkMode: localStorage.getItem('theme') === 'dark' }"
          @click="darkMode = !darkMode; localStorage.setItem('theme', darkMode ? 'dark' : 'light'); document.documentElement.classList.toggle('dark', darkMode)"
          class="p-2 text-secondary-500 hover:text-primary-600 dark:text-secondary-400 dark:hover:text-primary-400 transition-colors duration-200"
          aria-label="Toggle dark mode"
        >
          <svg x-show="!darkMode" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
          </svg>
          <svg x-show="darkMode" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="display: none;">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
          </svg>
        </button>
        
        <!-- Mobile menu button -->
        <button 
          @click="mobileMenuOpen = !mobileMenuOpen"
          class="lg:hidden p-2 text-secondary-500 hover:text-primary-600 dark:text-secondary-400 dark:hover:text-primary-400 transition-colors duration-200"
          aria-label="Toggle menu"
        >
          <svg x-show="!mobileMenuOpen" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
          </svg>
          <svg x-show="mobileMenuOpen" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="display: none;">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>
  
  <!-- Mobile Navigation -->
  <div 
    x-show="mobileMenuOpen"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 -translate-y-4"
    x-transition:enter-end="opacity-100 translate-y-0"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100 translate-y-0"
    x-transition:leave-end="opacity-0 -translate-y-4"
    class="lg:hidden glass border-t border-secondary-200 dark:border-secondary-800"
    style="display: none;"
  >
    <nav class="container-custom py-4 space-y-2">
      <a href="{{ '/' | relative_url }}" class="block px-4 py-3 rounded-lg text-secondary-700 dark:text-secondary-300 hover:bg-secondary-100 dark:hover:bg-secondary-800 {% if page.url == '/' %}bg-primary-50 text-primary-700 dark:bg-primary-900/30 dark:text-primary-300{% endif %}">Home</a>
      <a href="{{ '/about/' | relative_url }}" class="block px-4 py-3 rounded-lg text-secondary-700 dark:text-secondary-300 hover:bg-secondary-100 dark:hover:bg-secondary-800 {% if page.url contains '/about/' %}bg-primary-50 text-primary-700 dark:bg-primary-900/30 dark:text-primary-300{% endif %}">About</a>
      <a href="{{ '/blog/' | relative_url }}" class="block px-4 py-3 rounded-lg text-secondary-700 dark:text-secondary-300 hover:bg-secondary-100 dark:hover:bg-secondary-800 {% if page.url contains '/blog/' %}bg-primary-50 text-primary-700 dark:bg-primary-900/30 dark:text-primary-300{% endif %}">Blog</a>
      <a href="{{ '/projects/' | relative_url }}" class="block px-4 py-3 rounded-lg text-secondary-700 dark:text-secondary-300 hover:bg-secondary-100 dark:hover:bg-secondary-800 {% if page.url contains '/projects/' %}bg-primary-50 text-primary-700 dark:bg-primary-900/30 dark:text-primary-300{% endif %}">Projects</a>
      <a href="{{ '/services/' | relative_url }}" class="block px-4 py-3 rounded-lg text-secondary-700 dark:text-secondary-300 hover:bg-secondary-100 dark:hover:bg-secondary-800 {% if page.url contains '/services/' %}bg-primary-50 text-primary-700 dark:bg-primary-900/30 dark:text-primary-300{% endif %}">Services</a>
      <a href="{{ '/contact/' | relative_url }}" class="block px-4 py-3 rounded-lg text-secondary-700 dark:text-secondary-300 hover:bg-secondary-100 dark:hover:bg-secondary-800 {% if page.url contains '/contact/' %}bg-primary-50 text-primary-700 dark:bg-primary-900/30 dark:text-primary-300{% endif %}">Contact</a>
    </nav>
  </div>
</header>
